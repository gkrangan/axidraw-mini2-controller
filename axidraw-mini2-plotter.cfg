# AxiDraw Mini 2 — Plotter Configuration
# All settings here are loaded at startup by both the GUI and CLI.
# CLI flags override these values when supplied on the command line.
# GUI saves back to this file when "Apply Settings" is clicked.

[motion]
# Pen-down and pen-up movement speeds (1–100)
speed_pendown = 25
speed_penup   = 75

# Delay (milliseconds) after changing pen state before moving
pen_delay_down = 0
pen_delay_up   = 0

# Use constant speed instead of acceleration (true/false)
const_speed = false

[pen]
# Servo position when pen is lowered onto paper (0–100)
# Set for 45-degree pen angle mount
pen_pos_down = 5

# Servo position when pen is raised (0–100)
# Set for 45-degree pen angle mount
pen_pos_up = 30

[travel]
# Configurable axis travel limits (mm).
# x_max_mm cannot exceed 150; y_max_mm cannot exceed 100.
x_max_mm = 140
y_max_mm = 90

[device]
# AxiDraw model number (2 = Mini)
model = 2

# Serial port — leave blank for auto-detection
port =
